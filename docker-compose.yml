version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rpa_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rpa_platform
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-in-production
      JWT_SECRET_KEY: change-this-jwt-secret-in-production
      UPLOAD_FOLDER: /app/storage/uploads
      EVIDENCIAS_FOLDER: /app/storage/evidencias
      LOGS_FOLDER: /app/storage/logs
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "python run.py"

  worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rpa_platform
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-in-production
      JWT_SECRET_KEY: change-this-jwt-secret-in-production
      UPLOAD_FOLDER: /app/storage/uploads
      EVIDENCIAS_FOLDER: /app/storage/evidencias
      LOGS_FOLDER: /app/storage/logs
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "celery -A app.celery_app.celery worker --loglevel=info"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm rebuild vite && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  worker_data:
